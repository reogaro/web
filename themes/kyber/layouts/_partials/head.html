<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ printf "%s | %s" .Title site.Title }}{{ end }}</title>

<!-- SEO Meta Tags -->
<meta name="description" content="{{ if .IsHome }}{{ .Site.Params.tagline }}{{ else }}{{ .Summary | default .Site.Params.tagline }}{{ end }}">
<meta property="og:title" content="{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }}{{ end }}">
<meta property="og:description" content="{{ if .IsHome }}{{ .Site.Params.tagline }}{{ else }}{{ .Summary | default .Site.Params.tagline }}{{ end }}">
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
{{ if .Params.image }}<meta property="og:image" content="{{ .Permalink }}{{ .Params.image }}">{{ end }}
<meta name="twitter:card" content="summary_large_image">

<link rel="icon" type="image/png" href="{{ "favicon.png" | relURL }}">

{{ if .IsHome }}
<!-- Eagerly preload the massive splash background to eliminate CSS waterfall delay -->
<link rel="preload" href="{{ "img/background.jpg" | relURL }}" as="image" fetchpriority="high">
{{ end }}

{{ with .OutputFormats.Get "rss" -}}
  {{ printf `<link rel=%q type=%q href=%q title=%q>` .Rel .MediaType.Type .Permalink site.Title | safeHTML }}
{{ end }}
{{ partialCached "head/css.html" . }}
{{ partialCached "head/js.html" . }}
<!-- Hugo Shortcodes: Optional Header Embeds -->
